name: Study Abroad Lead Hunter

on:
  workflow_dispatch:

jobs:
  run-scanner:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Run Scanner
        run: node scanner.js
