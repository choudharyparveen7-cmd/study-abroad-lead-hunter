name: Study Abroad Lead Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Lead Scanner
        run: node leadHunter.js

      - name: Upload Leads
        uses: actions/upload-artifact@v4
        with:
          name: study-abroad-leads
          path: study_abroad_leads.doc
