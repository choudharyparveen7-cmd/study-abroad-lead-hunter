import axios from "axios";
import * as cheerio from "cheerio";
import fs from "fs";
import { createObjectCsvWriter } from "csv-writer";

const keywords = [
  "australia intake 2026",
  "study abroad help",
  "student visa help",
  "masters abroad",
  "need admission abroad"
];

const csvWriter = createObjectCsvWriter({
  path: "leads.csv",
  header: [
    { id: "platform", title: "PLATFORM" },
    { id: "title", title: "TITLE" },
    { id: "link", title: "LINK" },
    { id: "score", title: "SCORE" }
  ],
  append: true
});

function calculateScore(text) {
  let score = 0;

  const words = [
    "help",
    "visa",
    "admission",
    "urgent",
    "intake"
  ];

  words.forEach(word => {
    if (text.toLowerCase().includes(word)) {
      score += 10;
    }
  });

  return score;
}

function isQuestion(text) {
  const lower = text.toLowerCase();

  return (
    lower.includes("?") ||
    lower.includes("how") ||
    lower.includes("what") ||
    lower.includes("which") ||
    lower.includes("can i")
  );
}

function loadExistingLinks() {
  if (!fs.existsSync("leads.csv")) {
    return new Set();
  }

  const data = fs.readFileSync("leads.csv", "utf8");

  const lines = data.split("\n");

  const links = new Set();

  lines.forEach(line => {
    const parts = line.split(",");

    if (parts[2]) {
      links.add(parts[2]);
    }
  });

  return links;
}

async function scanReddit(keyword) {

  const leads = [];

  try {

    const url =
      `https://www.reddit.com/search.json?q=${encodeURIComponent(keyword)}&sort=new`;

    const response = await axios.get(url, {
      headers: {
        "User-Agent": "Mozilla/5.0"
      }
    });

    const posts = response.data.data.children;

    for (const post of posts) {

      const data = post.data;

      const text =
        `${data.title} ${data.selftext || ""}`;

      const score =
        calculateScore(text);

      if (
        score >= 20 &&
        isQuestion(text)
      ) {

        leads.push({
          platform: "Reddit",
          title: data.title,
          link: `https://reddit.com${data.permalink}`,
          score
        });

      }

    }

  } catch (error) {

    console.log("Reddit Error:", error.message);

  }

  return leads;
}

async function run() {

  console.log("Starting scanner");

  let allLeads = [];

  for (const keyword of keywords) {

    console.log(`Scanning ${keyword}`);

    const reddit =
      await scanReddit(keyword);

    allLeads = [
      ...allLeads,
      ...reddit
    ];

  }

  const existing =
    loadExistingLinks();

  allLeads =
    allLeads.filter(
      lead => !existing.has(lead.link)
    );

  if (allLeads.length > 0) {

    await csvWriter.writeRecords(allLeads);

    console.log(`${allLeads.length} leads saved`);

  } else {

    console.log("No new leads");

  }

}

run();
