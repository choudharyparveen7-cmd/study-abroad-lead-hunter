name:Study Abroad Lead Finder

on:
 schedule:
   - cron: "0 */6 * * *"
 workflow_dispatch:

jobs:
 scan:
   runs-on: ubuntu-latest

   steps:

   - uses: actions/checkout@v3

   - uses: actions/setup-node@v3
     with:
       node-version: 18

   - run: npm install

   - run: node leadHunter.js
     env:
       EMAIL_USER: ${{ secrets.EMAIL_USER }}
       EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
