name: Lead Scanner

on:
  schedule:
    - cron: '0 4 * * *'   # Runs daily at 9:30 AM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 📥 Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🟢 Step 2: Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ▶️ Step 3: Run your script
      - name: Run Lead Generator
        run: node leadHunter.js

      # 📤 Step 4: Upload artifact (DOWNLOADABLE FILE)
      - name: Upload Leads File
        uses: actions/upload-artifact@v4
        with:
          name: study-abroad-leads
          path: leads_*.doc

      # 💾 Step 5: Commit to repo (NO ERROR VERSION)
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily leads update"
          git push
